<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家務設備說明書資料庫</title>
    <style>
        /* 設定全域字體為 Meiryo UI */
        body { 
            font-family: "Meiryo UI", "Meiryo", "Microsoft JhengHei", sans-serif; 
            line-height: 1.6; 
            padding: 20px; 
            background: #f4f4f9; 
            color: #333; 
        }

        h1 { color: #333; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        /* 內文連結 (18px) */
        a { 
            text-decoration: none; 
            color: #007aff; 
            font-size: 18px; 
            display: flex; 
            align-items: center; 
            transition: 0.2s;
        }
        a:hover { color: #0056b3; }

        .dev-icon {
            width: 30px;
            height: 30px;
            margin-right: 12px;
            object-fit: contain;
        }

        /* 分類標題：粗體黑色 20px */
        .category { 
            font-weight: bold;
            color: #000;
            font-size: 20px;
            margin-top: 28px;
            margin-bottom: 8px;
            border-left: 6px solid #007aff;
            padding-left: 10px; 
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>設備說明書</h1>
        
        <div class="category">リビング</div>
        <ul>
            <li><a href="tv_manual.pdf"><img src="icon_tv.png" class="dev-icon" alt=""> テレビ</a></li>
            <li><a href="ac_living_manual.pdf"><img src="icon_ac.png" class="dev-icon" alt=""> エアコン</a></li>
            <li><a href="light_dining_manual.pdf"><img src="icon_light.png" class="dev-icon" alt=""> ライト(食卓)</a></li>
            <li><a href="light_living_manual.pdf"><img src="icon_light.png" class="dev-icon" alt=""> ライト(リビング)</a></li>
            <li><a href="light_playroom_manual.pdf"><img src="icon_light.png" class="dev-icon" alt=""> グライト(遊びルーム)</a></li>
        </ul>

        <div class="category">寝室</div>
        <ul>
            <li><a href="ac_bedroom_manual.pdf"><img src="icon_ac.png" class="dev-icon" alt=""> エアコン</a></li>
            <li><a href="light_manual.pdf"><img src="icon_light.png" class="dev-icon" alt=""> グライト</a></li>
        </ul>

        <div class="category">仕事部屋</div>
        <ul>
            <li><a href="xxx_manual.pdf"><img src="icon_xxx.png" class="dev-icon" alt=""> xxx</a></li>
        </ul>

        <div class="category">キッチン</div>
        <ul>
            <li><a href="refrigerator_manual.pdf"><img src="icon_fridge.png" class="dev-icon" alt=""> 冷凍冷蔵庫</a></li>
            <li><a href="dishwasher_manual.pdf"><img src="icon_dishwasher.png" class="dev-icon" alt=""> 食器洗浄乾燥機</a></li>
        </ul>

        <div class="category">浴室</div>
        <ul>
            <li><a href="washer_manual.pdf"><img src="icon_washer.png" class="dev-icon" alt=""> 洗濯機</a></li>
            <li><a href="xxx_manual.pdf"><img src="icon_heater.png" class="dev-icon" alt=""> 浴室暖房乾燥機</a></li>
        </ul>
        
        <div class="category">トイレ</div>
        <ul>
            <li><a href="washlet_manual.pdf"><img src="icon_toilet.png" class="dev-icon" alt=""> ウォシュレット</a></li>
        </ul>
    </div>
</body>
</html>
